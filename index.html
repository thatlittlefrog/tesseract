<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STM32 Pinout Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Start Screen -->
  <div id="start-screen" class="start-screen">
    <div class="start-content">
      <h1>STM32 Pinout Viewer</h1>
      <p class="start-subtitle">Search for any MCU from the
        <a href="https://github.com/STMicroelectronics/STM32_open_pin_data" target="_blank" rel="noopener">STM32_open_pin_data</a> repository
      </p>
      <div class="mcu-browser" id="mcu-browser">
        <input type="text" id="mcu-search" placeholder="e.g. H743, F042, N657..." autocomplete="off" spellcheck="false" autofocus>
        <div id="mcu-results" class="mcu-results"></div>
        <p id="mcu-status" class="mcu-status"></p>
      </div>
    </div>
  </div>

  <!-- Toolbar (hidden until file loaded) -->
  <div id="toolbar" style="display:none">
    <div class="toolbar-left">
      <button id="btn-load-new" class="toolbar-btn" title="Search for another MCU (Ctrl+O)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Search MCU
      </button>
      <button id="btn-clear" class="toolbar-btn" title="Clear all assignments">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear All
      </button>
    </div>
    <div class="toolbar-right">
      <span class="toolbar-label">Export:</span>
      <button id="btn-export-json" class="toolbar-btn btn-export" title="Export assignments as JSON">JSON</button>
      <button id="btn-export-csv" class="toolbar-btn btn-export" title="Export assignments as CSV">CSV</button>
      <button id="btn-export-text" class="toolbar-btn btn-export" title="Export assignments as text table">TXT</button>
      <button id="btn-export-full" class="toolbar-btn btn-export" title="Export full pinout table (all pins)">Full Pinout</button>
    </div>
  </div>

  <!-- Main View (hidden until file loaded) -->
  <div id="main-view" style="display:none">
    <div id="chip-container" class="chip-container"></div>
    <div id="sidebar" class="sidebar"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
